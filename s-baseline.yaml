---
edition: "3.0.0"
name: "fund_system_ai"
access: "default"
vars: {}
resources:
  fund_system_entry:
    component: "fc3"
    actions:
      complete-deploy:
      - plugin: "flow_api_registry"
        args: {}
      complete-remove:
      - plugin: "flow_api_registry"
        args: {}
    props:
      logConfig: "auto"
      handler: "index.handler"
      diskSize: 10240
      memorySize: 2048
      code: "./code"
      functionName: "fund_system_entry"
      cpu: 1
      runtime: "python3.10"
      description: ""
      region: "cn-shanghai"
      timeout: 60
  nervous-northcutt:
    component: "fc3"
    actions:
      complete-deploy:
      - plugin: "flow_api_registry"
        args: {}
      complete-remove:
      - plugin: "flow_api_registry"
        args: {}
    props:
      logConfig: "auto"
      handler: "index.handler"
      diskSize: 10240
      memorySize: 2048
      functionName: "nervous-northcutt"
      cpu: 1
      runtime: "python3.10"
      region: "cn-shanghai"
      timeout: 60
      code: "./code"

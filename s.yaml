---
edition: "3.0.0"
name: "fund_system_ai"
access: "default"
vars: {}
resources:
  fund_system_entry:
    component: "fc3"
    actions:
      complete-deploy:
      - plugin: "flow_api_registry"
        args: {}
      complete-remove:
      - plugin: "flow_api_registry"
        args: {}
    props:
      customRuntimeConfig:
        command: []
      logConfig: "auto"
      handler: "index.handler"
      code: "./code"
      functionName: "fund_system_entry"
      cpu: 1
      runtime: "custom.debian10"
      description: ""
      timeout: 60
      diskSize: 10240
      memorySize: 2048
      environmentVariables:
        PATH: "/opt/python3.9/bin:/usr/local/bin/apache-maven/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/ruby/bin:/opt/bin:/code:/code/bin"
        PYTHONPATH: "/opt/python:/code"
        LD_LIBRARY_PATH: "/code:/code/lib:/usr/local/lib:/opt/lib:/opt/php8.1/lib:/opt/php8.0/lib:/opt/php7.2/lib"
      layers:
      - "acs:fc:cn-shanghai:official:layers/Python39/versions/2"
      - "acs:fc:cn-shanghai:official:layers/Python39-Package-Collection/versions/2"
      - "acs:fc:cn-shanghai:official:layers/Python3-Flask2x/versions/2"
      region: "cn-shanghai"
  nervous-northcutt:
    component: "fc3"
    actions:
      complete-deploy:
      - plugin: "flow_api_registry"
        args: {}
      complete-remove:
      - plugin: "flow_api_registry"
        args: {}
    props:
      logConfig: "auto"
      handler: "index.handler"
      diskSize: 10240
      memorySize: 2048
      code: "./"
      functionName: "nervous-northcutt"
      cpu: 1
      runtime: "python3.10"
      region: "cn-shanghai"
      timeout: 60

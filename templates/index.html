<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#722ed1', // 企业紫色主色调
                            dark: '#531dab',   
                            light: '#f9f0ff',  
                            text: '#722ed1'    
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #d9d9d9;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c1c1c1;
        }
        .text-red { color: #f5222d; }
        .text-green { color: #52c41a; }
    </style>
</head>
<body class="flex flex-col h-screen bg-[#f0f2f5] font-sans text-gray-800 text-sm overflow-hidden">
    <!-- 顶部导航栏 -->
    <header class="h-14 bg-brand text-white flex items-center justify-between px-6 shrink-0 shadow-md z-10">
        <div class="flex items-center gap-4">
            <div class="font-bold text-lg flex items-center gap-2">
                <!-- 类似公司Logo的占位 -->
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>仪表盘</span>
            </div>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <span class="text-white/80">测试环境</span>
            <div class="flex items-center gap-2 cursor-pointer hover:bg-white/10 px-2 py-1 rounded transition">
                <div class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-xs">U</div>
                <span>User</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- 左侧边栏 -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 shadow-[2px_0_8px_rgba(0,0,0,0.05)] z-0">
            <div class="px-4 py-3 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center cursor-pointer">
                <span class="font-medium text-gray-700">我的组合</span>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
            <nav class="flex-1 overflow-y-auto py-2 px-2 flex flex-col gap-1" id="sidebar-nav">
                {% for portfolio in portfolios %}
                <button onclick="loadPortfolio('{{ portfolio.sub_account_name }}')" 
                        class="portfolio-btn w-full text-left px-4 py-2.5 rounded transition-all flex items-center justify-between group 
                        {% if portfolio.sub_account_name == selected_portfolio_name %}bg-brand-light text-brand font-medium border-r-2 border-brand{% else %}text-gray-600 hover:bg-brand-light/50 hover:text-brand{% endif %}"
                        data-name="{{ portfolio.sub_account_name }}">
                    <span class="truncate pr-2">{{ portfolio.sub_account_name }}</span>
                    <span class="text-xs text-gray-400 group-hover:text-brand/60 transition-colors">¥{{ "%.2f"|format(portfolio.asset_value) }}</span>
                </button>
                {% endfor %}
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-y-auto p-6 flex flex-col gap-5">
            <!-- 页面标题 & 操作区 -->
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-medium text-gray-800" id="current-portfolio-name">{{ selected_portfolio_name }}</span>
                    <span class="px-2 py-0.5 rounded bg-brand-light text-brand text-xs border border-brand/20">当前选中</span>
                </div>
                <div class="flex gap-3">
                    <button class="px-4 py-1.5 bg-white border border-gray-300 text-gray-600 rounded shadow-sm hover:text-brand hover:border-brand transition text-sm">重置</button>
                    <button onclick="loadPortfolio(document.getElementById('current-portfolio-name').textContent)" class="px-4 py-1.5 bg-brand text-white rounded shadow-sm hover:bg-brand-dark transition flex items-center gap-1 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        刷新数据
                    </button>
                </div>
            </div>

            <!-- 数据概览卡片 -->
            <div class="bg-white rounded-md shadow-sm border border-gray-100 p-5">
                <div class="grid grid-cols-4 gap-6" id="summary-panel">
                    <div class="col-span-4 text-center text-gray-400 py-6">正在加载组合数据...</div>
                </div>
            </div>

            <!-- 数据表格区 -->
            <div class="bg-white rounded-md shadow-sm border border-gray-100 flex-1 flex flex-col min-h-[400px]">
                <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-md">
                    <h3 class="font-medium text-gray-800">数据明细</h3>
                    <div class="flex gap-2">
                        <!-- 类似截图中的工具栏按钮 -->
                        <button class="p-1.5 text-gray-400 hover:text-brand hover:bg-brand-light rounded transition" title="刷新"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
                        <button class="p-1.5 text-gray-400 hover:text-brand hover:bg-brand-light rounded transition" title="设置"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-[#fafafa] text-gray-600 sticky top-0 z-10">
                            <tr>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('fund_name')">基金名称 <span id="sort-icon-fund_name" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('fund_code')">基金代码 <span id="sort-icon-fund_code" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 text-right cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('asset_value')">资产市值 (元) <span id="sort-icon-asset_value" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 text-right cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('constant_profit')">持有收益 (元) <span id="sort-icon-constant_profit" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 text-right cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('constant_profit_rate')">持有收益率 <span id="sort-icon-constant_profit_rate" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 text-right cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('estimated_profit')">今日估算收益 (元) <span id="sort-icon-estimated_profit" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 text-right cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('estimated_change')">今日估值增长率 <span id="sort-icon-estimated_change" class="inline-block w-3 text-center text-gray-400"></span></th>
                                <th class="py-3 px-5 font-medium text-xs border-b border-gray-200 text-right cursor-pointer hover:bg-gray-100 transition select-none" onclick="handleSort('est_total_rate')">预估总收益率 <span id="sort-icon-est_total_rate" class="inline-block w-3 text-center text-gray-400"></span></th>
                            </tr>
                        </thead>
                        <tbody id="portfolio-table-body" class="text-gray-600">
                            <tr><td colspan="8" class="py-12 text-center text-gray-400">请选择左侧组合以加载数据</td></tr>
                        </tbody>
                    </table>
                </div>
                <!-- 底部状态栏 -->
                <div class="px-5 py-3 border-t border-gray-100 bg-gray-50 flex justify-between items-center text-xs text-gray-500 rounded-b-md">
                    <span id="table-footer-info">共 0 项数据</span>
                    <span></span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const selectedPortfolioName = "{{ selected_portfolio_name }}";
        
        let portfolioData = [];
        let currentSortCol = null;
        let currentSortAsc = false; // 默认降序
        
        function handleSort(col) {
            if (currentSortCol === col) {
                currentSortAsc = !currentSortAsc;
            } else {
                currentSortCol = col;
                currentSortAsc = false; // 切换列时默认降序
            }
            renderTable();
        }

        function renderTable() {
            // 更新排序图标
            const cols = ['fund_name', 'fund_code', 'asset_value', 'constant_profit', 'constant_profit_rate', 'estimated_profit', 'estimated_change', 'est_total_rate'];
            cols.forEach(c => {
                const iconEl = document.getElementById('sort-icon-' + c);
                if (iconEl) iconEl.textContent = '';
            });
            if (currentSortCol) {
                const activeIconEl = document.getElementById('sort-icon-' + currentSortCol);
                if (activeIconEl) {
                    activeIconEl.textContent = currentSortAsc ? '↑' : '↓';
                }
            }

            if (!portfolioData || portfolioData.length === 0) {
                document.getElementById('portfolio-table-body').innerHTML = '<tr><td colspan="8" class="py-12 text-center text-gray-400">暂无资产明细</td></tr>';
                document.getElementById('table-footer-info').textContent = '共 0 项数据';
                return;
            }

            // 排序数据
            let dataToRender = [...portfolioData];
            if (currentSortCol) {
                dataToRender.sort((a, b) => {
                    let valA = a[currentSortCol];
                    let valB = b[currentSortCol];
                    
                    if (currentSortCol === 'estimated_profit') {
                        valA = (a.asset_value || 0) * (a.estimated_change || 0) / 100;
                        valB = (b.asset_value || 0) * (b.estimated_change || 0) / 100;
                    } else if (currentSortCol === 'est_total_rate') {
                        valA = (a.constant_profit_rate || 0) + (a.estimated_change || 0);
                        valB = (b.constant_profit_rate || 0) + (b.estimated_change || 0);
                    } else if (currentSortCol === 'fund_name' || currentSortCol === 'fund_code') {
                        valA = valA || '';
                        valB = valB || '';
                        return currentSortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    }

                    valA = Number(valA) || 0;
                    valB = Number(valB) || 0;
                    if (valA < valB) return currentSortAsc ? -1 : 1;
                    if (valA > valB) return currentSortAsc ? 1 : -1;
                    return 0;
                });
            }

            const tableHtml = dataToRender.map(item => {
                const estChange = item.estimated_change || 0;
                const assetVal = item.asset_value || 0;
                const estProfit = assetVal * estChange / 100;
                const holdProfit = item.constant_profit || 0;
                const holdProfitRate = item.constant_profit_rate || 0;
                const estTotalRate = holdProfitRate + estChange;
                
                return `
                    <tr class="hover:bg-brand-light/30 transition-colors border-b border-gray-50 last:border-0">
                        <td class="py-3 px-5 text-gray-800">${item.fund_name || '-'}</td>
                        <td class="py-3 px-5 text-gray-500">${item.fund_code || '-'}</td>
                        <td class="py-3 px-5 text-right font-medium">${formatNumber(assetVal)}</td>
                        <td class="py-3 px-5 text-right font-medium ${formatColorClass(holdProfit)}">${formatPrefix(holdProfit)}${formatNumber(holdProfit)}</td>
                        <td class="py-3 px-5 text-right font-medium ${formatColorClass(holdProfitRate)}">${formatPrefix(holdProfitRate)}${formatNumber(holdProfitRate)}%</td>
                        <td class="py-3 px-5 text-right font-medium ${formatColorClass(estProfit)}">${formatPrefix(estProfit)}${formatNumber(estProfit)}</td>
                        <td class="py-3 px-5 text-right font-medium ${formatColorClass(estChange)}">${formatPrefix(estChange)}${formatNumber(estChange)}%</td>
                        <td class="py-3 px-5 text-right font-medium ${formatColorClass(estTotalRate)}">${formatPrefix(estTotalRate)}${formatNumber(estTotalRate)}%</td>
                    </tr>
                `;
            }).join('');
            document.getElementById('portfolio-table-body').innerHTML = tableHtml;
            document.getElementById('table-footer-info').textContent = `共 ${dataToRender.length} 项数据`;
        }

        function formatNumber(num) {
            return Number(num).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatColorClass(num) {
            if (num > 0) return 'text-red';
            if (num < 0) return 'text-green';
            return 'text-gray-800';
        }

        function formatPrefix(num) {
            return num > 0 ? '+' : '';
        }

        function loadPortfolio(name) {
            if (!name) return;
            
            // 更新左侧导航选中状态
            document.querySelectorAll('.portfolio-btn').forEach(btn => {
                if (btn.dataset.name === name) {
                    btn.className = "portfolio-btn w-full text-left px-4 py-2.5 rounded transition-all flex items-center justify-between group bg-brand-light text-brand font-medium border-r-2 border-brand";
                } else {
                    btn.className = "portfolio-btn w-full text-left px-4 py-2.5 rounded transition-all flex items-center justify-between group text-gray-600 hover:bg-brand-light/50 hover:text-brand";
                }
            });
            
            document.getElementById('current-portfolio-name').textContent = name;
            document.getElementById('summary-panel').innerHTML = '<div class="col-span-4 text-center text-gray-400 py-6"><div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-brand mb-2"></div><br>加载中...</div>';
            document.getElementById('portfolio-table-body').innerHTML = '<tr><td colspan="8" class="py-12 text-center text-gray-400"><div class="inline-block animate-spin rounded-full h-5 w-5 border-b-2 border-brand"></div></td></tr>';
            document.getElementById('table-footer-info').textContent = '加载中...';

            fetch(`/api/portfolio/${encodeURIComponent(name)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('portfolio-table-body').innerHTML = `<tr><td colspan="8" class="py-12 text-center text-red-500">加载失败: ${data.error}</td></tr>`;
                        document.getElementById('summary-panel').innerHTML = '<div class="col-span-4 text-center text-red-500 py-6">数据加载失败</div>';
                        document.getElementById('table-footer-info').textContent = '加载失败';
                        return;
                    }
                    
                    const estProfitValue = data.estimated_portfolio_change_ratio * data.total_assets / 100;

                    // 更新概览面板
                    const summaryHtml = `
                        <div class="flex flex-col gap-1.5">
                            <span class="text-xs text-gray-500 font-medium">总资产 (元)</span>
                            <span class="text-2xl font-bold text-gray-800">${formatNumber(data.total_assets)}</span>
                        </div>
                        <div class="flex flex-col gap-1.5 pl-6 border-l border-gray-100">
                            <span class="text-xs text-gray-500 font-medium">持有总收益 (元)</span>
                            <span class="text-2xl font-bold ${formatColorClass(data.total_profit)}">${formatPrefix(data.total_profit)}${formatNumber(data.total_profit)}</span>
                        </div>
                        <div class="flex flex-col gap-1.5 pl-6 border-l border-gray-100">
                            <span class="text-xs text-gray-500 font-medium">今日估算收益 (元)</span>
                            <span class="text-2xl font-bold ${formatColorClass(estProfitValue)}">${formatPrefix(estProfitValue)}${formatNumber(estProfitValue)}</span>
                        </div>
                        <div class="flex flex-col gap-1.5 pl-6 border-l border-gray-100">
                            <span class="text-xs text-gray-500 font-medium">整体估值增长率</span>
                            <span class="text-2xl font-bold ${formatColorClass(data.estimated_portfolio_change_ratio)}">${formatPrefix(data.estimated_portfolio_change_ratio)}${formatNumber(data.estimated_portfolio_change_ratio)}%</span>
                        </div>
                    `;
                    document.getElementById('summary-panel').innerHTML = summaryHtml;

                    portfolioData = data.portfolio_details || [];
                    renderTable();
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('portfolio-table-body').innerHTML = `<tr><td colspan="8" class="py-12 text-center text-red-500">请求错误</td></tr>`;
                    document.getElementById('table-footer-info').textContent = '加载失败';
                });
        }

        // 初始化加载
        if (selectedPortfolioName) {
            loadPortfolio(selectedPortfolioName);
        }
    </script>
</body>
</html>
